# Configuration file for Siamese Autoencoder IDS Project

# Data Configuration
data:
  data_path: "data"  # Path to NSL-KDD dataset directory (will auto-download if not present)
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  batch_size: 64

# Model Configuration
model:
  input_dim: 41  # NSL-KDD has 41 features
  encoding_dim: 32
  hidden_dims: [64, 32]

# Training Configuration
training:
  num_epochs: 50
  learning_rate: 0.001
  device: "cpu"  # "cpu" or "cuda"
  
  # Curriculum Learning
  curriculum:
    enabled: true
    easy_epochs: 5
    medium_epochs: 10
    hard_epochs: 15

# Evaluation Configuration
evaluation:
  threshold: null  # null for optimal threshold selection
  
# Adversarial Robustness Configuration
adversarial:
  enabled: true
  attack_types: ["fgsm", "pgd"]
  eps_values: [0.01, 0.05, 0.1]

# Explainability Configuration
explainability:
  enabled: true
  methods: ["integrated_gradients", "gradient_shap", "saliency"]
  top_k_features: 10

# Data Drift Detection Configuration
drift_detection:
  enabled: true
  threshold: 0.05

# Model Export Configuration
export:
  onnx_enabled: true
  model_save_path: "models/"

